services:
  web:
    build: .
    container_name: hitalent_api
    command: sh -c "python manage.py migrate && gunicorn myapi.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_DEBUG: "true"
      POSTGRES_DB: hitalent_db
      POSTGRES_USER: hitalent_user
      POSTGRES_PASSWORD: hitalent_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: hitalent_postgres
    environment:
      POSTGRES_DB: hitalent_db
      POSTGRES_USER: hitalent_user
      POSTGRES_PASSWORD: hitalent_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hitalent_user -d hitalent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
